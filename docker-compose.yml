# ShineMonitor MQTT Bridge - Docker Compose
# Usage:
#   1. Copy .env.example to .env and fill in your details
#   2. Run: docker compose up -d

services:
  shinemonitor-bridge:
    build: .
    container_name: shinemonitor-mqtt-bridge
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8080:8080"
    # If your MQTT broker is on the host machine, uncomment:
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"
